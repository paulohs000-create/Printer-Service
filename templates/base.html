<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Ponto{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f6f7fb; }
    header { background:#111827; color:#fff; padding:14px 18px; display:flex; gap:14px; align-items:center; }
    header a { color:#fff; text-decoration:none; opacity:.9; }
    header a:hover { opacity:1; text-decoration:underline; }
    .wrap { max-width: 1100px; margin: 18px auto; padding: 0 14px; }
    .card { background:#fff; border-radius:12px; padding:16px; box-shadow:0 1px 10px rgba(0,0,0,.06); margin-bottom:14px; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; border-bottom:1px solid #e5e7eb; text-align:left; vertical-align: top; }
    th { background:#f3f4f6; }
    .btn { display:inline-block; padding:10px 12px; border-radius:10px; border:0; cursor:pointer; text-decoration:none; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-danger { background:#dc2626; color:#fff; }
    .btn-gray { background:#374151; color:#fff; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .flash { padding:10px 12px; border-radius:10px; margin-bottom:10px; }
    .flash.success { background:#dcfce7; color:#166534; }
    .flash.error { background:#fee2e2; color:#991b1b; }
    .muted { color:#6b7280; font-size: 13px; }
    input, select { padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; width:100%; }
    .pos { color:#166534; font-weight:bold; }
    .neg { color:#991b1b; font-weight:bold; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; background:#eef2ff; color:#3730a3; font-size:12px; }
  </style>
</head>
<body>
  <header>
    <strong>Ponto</strong>

    {% if current_user.is_authenticated %}
      <a href="{{ url_for('week') }}">Semana</a>
      <span style="flex:1"></span>
      <a href="{{ url_for('logout') }}">Sair</a>
    {% endif %}
  </header>

  <div class="wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
